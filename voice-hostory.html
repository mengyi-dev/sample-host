<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Clone - Voice & Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        body { overscroll-behavior-y: contain; } /* Prevents pull-to-refresh on mobile */
    </style>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">

    <div class="bg-white w-full h-screen sm:h-[800px] sm:max-w-[400px] sm:rounded-3xl sm:shadow-2xl flex flex-col relative overflow-hidden">
        
        <div class="bg-white px-4 py-3 shadow-sm z-10 flex flex-col border-b">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl shadow-sm">🤖</div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">My ChatBot</h1>
                    <p class="text-xs text-green-500 font-medium">Active now</p>
                </div>
            </div>
            
            <div class="mt-3 bg-gray-50 rounded-lg p-2 border border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-gray-400 text-sm">💾</span>
                    <div class="text-[10px] text-gray-500 font-medium">
                        <span id="storage-used" class="text-gray-800 font-bold">0 MB</span> used
                    </div>
                </div>
                <div class="text-[10px] text-gray-400">
                    Max: <span id="storage-total">0 GB</span>
                </div>
            </div>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto p-4 space-y-4 bg-white flex flex-col">
            <div class="text-center text-gray-400 text-sm mt-10" id="empty-state">
                No messages yet. Send a text or voice note!
            </div>
        </div>

        <div id="recording-ui" class="hidden absolute bottom-[70px] left-4 right-4 bg-red-500 text-white rounded-full py-2 px-4 flex justify-between items-center shadow-lg animate-pulse z-20">
            <span class="text-sm font-bold flex items-center gap-2">
                <div class="w-2 h-2 bg-white rounded-full"></div> Recording...
            </span>
            <button id="cancel-mic-btn" class="text-xs bg-black/20 px-3 py-1 rounded-full hover:bg-black/30">Stop & Save</button>
        </div>

        <div class="bg-white p-3 border-t flex items-end gap-2 pb-safe">
            <div class="flex-1 bg-gray-100 rounded-3xl min-h-[40px] flex items-center px-4 py-1">
                <input type="text" id="text-input" class="w-full bg-transparent border-none focus:ring-0 text-sm py-2 focus:outline-none" placeholder="Message..." autocomplete="off">
            </div>

            <div class="flex items-center justify-center mb-1">
                <button id="mic-btn" class="text-blue-600 p-2 hover:bg-blue-50 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path></svg>
                </button>
                
                <button id="send-btn" class="text-blue-600 p-2 hover:bg-blue-50 rounded-full transition-colors hidden">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. DATABASE SETUP (Supports text & audio)
        // ==========================================
        const db = new Dexie('ChatbotHistory');
        db.version(2).stores({
            messages: '++id, timestamp, type' 
        });

        // ==========================================
        // 2. UI ELEMENTS
        // ==========================================
        const textInput = document.getElementById('text-input');
        const micBtn = document.getElementById('mic-btn');
        const sendBtn = document.getElementById('send-btn');
        const chatList = document.getElementById('chat-list');
        const emptyState = document.getElementById('empty-state');
        const recordingUi = document.getElementById('recording-ui');
        const cancelMicBtn = document.getElementById('cancel-mic-btn');

        // Dashboard elements
        const storageUsedEl = document.getElementById('storage-used');
        const storageTotalEl = document.getElementById('storage-total');

        let mediaRecorder;
        let audioChunks = [];

        // ==========================================
        // 3. STORAGE DASHBOARD LOGIC
        // ==========================================
        async function updateStorageDashboard() {
            if (navigator.storage && navigator.storage.estimate) {
                try {
                    const estimate = await navigator.storage.estimate();
                    // Convert bytes to MB/GB
                    const usedMB = (estimate.usage / (1024 * 1024)).toFixed(2);
                    const totalGB = (estimate.quota / (1024 * 1024 * 1024)).toFixed(1);
                    
                    storageUsedEl.innerText = `${usedMB} MB`;
                    storageTotalEl.innerText = `${totalGB} GB`;
                } catch (e) {
                    console.log("Storage estimation failed", e);
                }
            } else {
                storageUsedEl.innerText = "N/A";
                storageTotalEl.innerText = "N/A";
            }
        }

        // ==========================================
        // 4. TEXT CHAT LOGIC (Dynamic Input Toggling)
        // ==========================================
        textInput.addEventListener('input', () => {
            if (textInput.value.trim().length > 0) {
                micBtn.classList.add('hidden');
                sendBtn.classList.remove('hidden');
            } else {
                micBtn.classList.remove('hidden');
                sendBtn.classList.add('hidden');
            }
        });

        sendBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) return;

            await db.messages.add({
                type: 'text',
                content: text,
                timestamp: Date.now()
            });

            textInput.value = '';
            micBtn.classList.remove('hidden');
            sendBtn.classList.add('hidden');
            
            await loadMessages();
        });

        // Allow sending with 'Enter' key
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // ==========================================
        // 5. VOICE RECORDING LOGIC
        // ==========================================
        micBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    let audioType = 'audio/webm';
                    if (typeof MediaRecorder.isTypeSupported === 'function') {
                        if (MediaRecorder.isTypeSupported('audio/mp4')) audioType = 'audio/mp4';
                        else if (MediaRecorder.isTypeSupported('audio/ogg')) audioType = 'audio/ogg';
                    }

                    const audioBlob = new Blob(audioChunks, { type: audioType });
                    
                    await db.messages.add({
                        type: 'audio',
                        audioBlob: audioBlob,
                        timestamp: Date.now()
                    });
                    
                    loadMessages();
                };

                mediaRecorder.start();
                
                // Show recording UI, hide input
                recordingUi.classList.remove('hidden');
                textInput.disabled = true;
                textInput.placeholder = "Recording audio...";

            } catch (err) {
                alert("Microphone access denied! Make sure you are on HTTPS.");
            }
        });

        cancelMicBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            
            // Reset UI
            recordingUi.classList.add('hidden');
            textInput.disabled = false;
            textInput.placeholder = "Message...";
        });

        // ==========================================
        // 6. RENDER CHAT BUBBLES
        // ==========================================
        async function loadMessages() {
            const messages = await db.messages.orderBy('timestamp').toArray();
            chatList.innerHTML = '';
            
            if (messages.length === 0) {
                chatList.appendChild(emptyState);
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            messages.forEach(msg => {
                const item = document.createElement('div');
                // Messenger-style right-aligned user bubble
                item.className = 'flex flex-col items-end w-full animate-fade-in-up mb-2';
                
                let contentHtml = '';
                if (msg.type === 'text') {
                    contentHtml = `<div class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-br-sm max-w-[80%] text-sm shadow-sm break-words">${msg.content}</div>`;
                } else if (msg.type === 'audio') {
                    const audioUrl = URL.createObjectURL(msg.audioBlob);
                    contentHtml = `
                        <div class="bg-blue-600 p-1.5 rounded-2xl rounded-br-sm shadow-sm max-w-[85%]">
                            <audio controls src="${audioUrl}" class="h-10 w-48 sm:w-56"></audio>
                        </div>
                    `;
                }

                item.innerHTML = `
                    ${contentHtml}
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[10px] text-gray-400">${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        <button onclick="deleteMessage(${msg.id})" class="text-[10px] text-red-400 hover:text-red-600">Delete</button>
                    </div>
                `;
                chatList.appendChild(item);
            });

            // Scroll to bottom
            chatList.scrollTop = chatList.scrollHeight;
            
            // Update storage dashboard after loading
            updateStorageDashboard();
        }

        window.deleteMessage = async (id) => {
            await db.messages.delete(id);
            loadMessages();
        };

        // Initialize UI
        loadMessages();
    </script>
</body>
</html>
