<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Character Variations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        .flip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .flip-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            transition: all 0.3s ease;
        }

        .flip-card:hover {
            border-color: #6366f1;
            background: #1e293b;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .base-text {
            font-size: 2.25rem;
            font-weight: 900;
            display: flex;
            perspective: 1000px;
        }

        .base-text span {
            display: inline-block;
            transform-style: preserve-3d;
        }

        /* 1. Classic Y Flip */
        .v-flip-y span { animation: flipY 3s infinite; }
        @keyframes flipY {
            0%, 70% { transform: rotateY(0deg); }
            85% { transform: rotateY(180deg); color: #818cf8; }
            100% { transform: rotateY(360deg); }
        }

        /* 2. Classic X Flip */
        .v-flip-x span { animation: flipX 3s infinite; }
        @keyframes flipX {
            0%, 70% { transform: rotateX(0deg); }
            85% { transform: rotateX(180deg); color: #fbbf24; }
            100% { transform: rotateX(360deg); }
        }

        /* 3. Elastic Flip */
        .v-elastic span { animation: flipElastic 3s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes flipElastic {
            0%, 70% { transform: rotateY(0deg); }
            85% { transform: rotateY(180deg) scale(1.4); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        /* 4. Drop Flip */
        .v-drop span { animation: flipDrop 3s infinite; }
        @keyframes flipDrop {
            0%, 70% { transform: translateY(0) rotateX(0); opacity: 1; }
            80% { transform: translateY(-20px) rotateX(90deg); opacity: 0.5; }
            100% { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        /* 5. Diagonal Flip */
        .v-diagonal span { animation: flipDiag 3s infinite; }
        @keyframes flipDiag {
            0%, 70% { transform: rotate3d(1, 1, 0, 0deg); }
            85% { transform: rotate3d(1, 1, 0, 180deg); color: #f43f5e; }
            100% { transform: rotate3d(1, 1, 0, 360deg); }
        }

        /* 6. Overshoot Flip */
        .v-overshoot span { animation: flipOver 3s infinite; }
        @keyframes flipOver {
            0%, 70% { transform: rotateY(0deg); }
            80% { transform: rotateY(200deg); }
            90% { transform: rotateY(170deg); }
            100% { transform: rotateY(180deg); }
        }

        /* 7. Swing Flip (Bottom Hinge) */
        .v-swing span { transform-origin: bottom; animation: flipSwing 3s infinite; }
        @keyframes flipSwing {
            0%, 70% { transform: rotateX(0deg); }
            85% { transform: rotateX(-90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        /* 8. Fade & Flip */
        .v-fade-flip span { animation: flipFade 3s infinite; }
        @keyframes flipFade {
            0%, 70% { transform: rotateY(0deg) scale(1); opacity: 1; }
            85% { transform: rotateY(90deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        /* 9. Skew Flip */
        .v-skew span { animation: flipSkew 3s infinite; }
        @keyframes flipSkew {
            0%, 70% { transform: skew(0deg) rotateY(0deg); }
            85% { transform: skew(20deg) rotateY(180deg); color: #2dd4bf; }
            100% { transform: skew(0deg) rotateY(360deg); }
        }

        /* 10. Coin Toss */
        .v-coin span { animation: flipCoin 3s infinite ease-out; }
        @keyframes flipCoin {
            0%, 70% { transform: translateY(0) rotateY(0deg); }
            80% { transform: translateY(-40px) rotateY(180deg); }
            100% { transform: translateY(0) rotateY(360deg); }
        }

        /* 11. Scale Down Flip */
        .v-scale span { animation: flipScale 3s infinite; }
        @keyframes flipScale {
            0%, 70% { transform: scale(1) rotateY(0deg); }
            85% { transform: scale(0.2) rotateY(180deg); }
            100% { transform: scale(1) rotateY(360deg); }
        }

        /* 12. Glitch Flip */
        .v-glitch span { animation: flipGlitch 3s infinite; }
        @keyframes flipGlitch {
            0%, 70% { transform: rotateY(0deg); filter: hue-rotate(0deg); }
            75% { transform: rotateY(45deg) translateX(5px); filter: hue-rotate(90deg); }
            80% { transform: rotateY(180deg) translateX(-5px); filter: hue-rotate(180deg); }
            100% { transform: rotateY(360deg); filter: hue-rotate(0deg); }
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">Flip-by-Char Variations</h1>
            <p class="text-slate-400">12 unique ways to execute a sequential character-by-character flip.</p>
        </header>

        <div class="flip-grid">
            <div class="flip-card">
                <div class="label">1. Classic Y-Axis</div>
                <div class="base-text v-flip-y" data-text="MODERN"></div>
            </div>
            <div class="flip-card">
                <div class="label">2. Classic X-Axis</div>
                <div class="base-text v-flip-x" data-text="ROTOR"></div>
            </div>
            <div class="flip-card">
                <div class="label">3. Elastic Spring</div>
                <div class="base-text v-elastic" data-text="BOUNCY"></div>
            </div>
            <div class="flip-card">
                <div class="label">4. Drop & Rotate</div>
                <div class="base-text v-drop" data-text="FALLEN"></div>
            </div>
            <div class="flip-card">
                <div class="label">5. Diagonal Spin</div>
                <div class="base-text v-diagonal" data-text="TILTED"></div>
            </div>
            <div class="flip-card">
                <div class="label">6. Overshoot Stop</div>
                <div class="base-text v-overshoot" data-text="RIPPLE"></div>
            </div>
            <div class="flip-card">
                <div class="label">7. Swing Hinge</div>
                <div class="base-text v-swing" data-text="HANGING"></div>
            </div>
            <div class="flip-card">
                <div class="label">8. Shrink & Fade</div>
                <div class="base-text v-fade-flip" data-text="GHOSTY"></div>
            </div>
            <div class="flip-card">
                <div class="label">9. Skewed Flip</div>
                <div class="base-text v-skew" data-text="SLANTED"></div>
            </div>
            <div class="flip-card">
                <div class="label">10. Coin Toss</div>
                <div class="base-text v-coin" data-text="JUMPING"></div>
            </div>
            <div class="flip-card">
                <div class="label">11. Scale Ripple</div>
                <div class="base-text v-scale" data-text="PULSING"></div>
            </div>
            <div class="flip-card">
                <div class="label">12. Digital Glitch</div>
                <div class="base-text v-glitch" data-text="MATRIX"></div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Initializes the staggered character animations.
         * Splits text into spans and applies a calculated animation-delay.
         */
        const initFlips = () => {
            const elements = document.querySelectorAll('[data-text]');
            elements.forEach(el => {
                const text = el.getAttribute('data-text');
                const delay = 0.12; // Controls the sequential offset speed
                
                el.innerHTML = text.split('').map((char, i) => {
                    // Maintain layout for spaces
                    const content = char === ' ' ? '&nbsp;' : char;
                    return `<span style="animation-delay: ${i * delay}s">${content}</span>`;
                }).join('');
            });
        };

        // Ensure the DOM is fully loaded before running the script
        window.addEventListener('DOMContentLoaded', initFlips);
    </script>
</body>
</html>
